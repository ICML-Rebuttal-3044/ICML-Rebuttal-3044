<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ViMoGen Rebuttal Link</title>
  <style>
    :root {
      --bg: #f7f8fa;
      --card: #ffffff;
      --text: #1a1a1a;
      --subtext: #666;
      --border: #e3e6eb;
      --accent: #1f4e79;
      --shadow: 0 6px 24px rgba(0, 0, 0, 0.06);
      --radius: 14px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", Arial, Helvetica, sans-serif;
      line-height: 1.6;
    }

    body {
      width: 100%;
    }

    .page {
      width: min(96vw, 1800px);
      margin: 28px auto 40px auto;
      padding: 0 12px;
    }

    .hero {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 40px 36px 30px 36px;
      text-align: center;
      margin-bottom: 28px;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(28px, 3vw, 42px);
      font-weight: 700;
      color: #111;
      line-height: 1.25;
    }

    .subtitle {
      margin-top: 12px;
      font-size: 18px;
      color: #333;
      font-weight: 500;
    }

    .subsubtitle {
      margin-top: 4px;
      font-size: 16px;
      color: var(--subtext);
    }

    .section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px 28px 24px 28px;
      margin-bottom: 24px;
    }

    .section h2 {
      margin: 0 0 18px 0;
      font-size: 26px;
      color: var(--accent);
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 14px;
      margin-top: 8px;
    }

    .gallery img {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #fafafa;
      display: block;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .gallery img:hover {
      transform: scale(1.015);
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
    }

    .caption {
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px dashed var(--border);
      font-size: 15px;
      color: #444;
      text-align: center;
    }

    @media (max-width: 900px) {
      .page {
        width: 98vw;
        padding: 0 8px;
      }

      .hero {
        padding: 28px 18px 24px 18px;
      }

      .section {
        padding: 20px 16px 18px 16px;
      }

      .gallery {
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="hero">
      <h1>ViMoGen: Enhancing VLA Post-Training via Kinematics-Aware Video Synthesis</h1>
      <div class="subtitle">ICML 2025 Submission 3044 Rebuttal Link</div>
      <div class="subsubtitle">Anonymous Author</div>
    </div>

    <div class="section">
      <h2>Out-of-Distribution Observation Generation</h2>

      <div class="gallery" id="gallery"></div>

      <div class="caption">
        Target object (<i>bbq sauce</i>) rotated by 45° in the task
        “pick up the bbq sauce and place it in the basket”.
      </div>
    </div>
  </div>

  <script>
    const gallery = document.getElementById("gallery");
    for (let i = 0; i <= 36; i++) {
      const img = document.createElement("img");
      img.src = `assets/0_${i}.jpg`;
      img.alt = `OOD observation generation ${i}`;
      img.loading = "lazy";
      gallery.appendChild(img);
    }
  </script>
</body>
</html>
